slam_toolbox:
  ros__parameters:
    use_sim_time: true

    odom_frame: odom
    map_frame: map
    base_frame: base_footprint
    scan_topic: /scan

    mode: mapping

    use_scan_matching: false
    do_loop_closing: false

    resolution: 0.05
    max_laser_range: 8.0
    minimum_time_interval: 0.1
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    transform_publish_period: 0.02
    map_update_interval: 1.0
    throttle_scans: 1
    scan_queue_size: 10